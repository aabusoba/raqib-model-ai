
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name raqib-ai.nafusah.tech localhost;

        # Central Health Check (Root) - Returns JSON status
        location / {
            # Clean JSON response for status check
            default_type application/json;
            return 200 '{"status": "online", "system": "Raqib AI - Traffic DSS Hub", "version": "1.0.0", "message": "All systems operational. Access dashboards at /mod1/ and /mod2/"}';
        }


        # Model 1 Dashboard (Streamlit)
        location /mod1/ {
            proxy_pass http://model1-dashboard:8501/mod1/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Model 1 API
        location /mod1/api/ {
            rewrite ^/mod1/api/(.*)$ /$1 break;
            proxy_pass http://model1-api:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Model 2 Dashboard (Streamlit)
        location /mod2/ {
            proxy_pass http://model2-dashboard:8502/mod2/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Model 2 API
        location /mod2/api/ {
            rewrite ^/mod2/api/(.*)$ /$1 break;
            proxy_pass http://model2-api:5001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
