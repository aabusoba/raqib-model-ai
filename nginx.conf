events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 9090;
        server_name raqib-ai.nafusah.tech localhost;

        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Central Health Check (Root)
        location / {
            default_type application/json;
            return 200 '{"status": "online", "system": "Raqib AI - Traffic DSS Hub", "version": "1.0.0", "message": "All systems operational. Access dashboards at /mod1/ and /mod2/"}';
        }

        # Model 1 Dashboard
        location /mod1/ {
            set $upstream_mod1_dash http://model1-dashboard:8501;
            proxy_pass $upstream_mod1_dash; # No trailing slash here to preserve URI with baseUrlPath
            
            # WebSocket Support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            proxy_connect_timeout 60s;
        }

        # Model 1 API
        location /mod1/api/ {
            rewrite ^/mod1/api/(.*)$ /$1 break;
            set $upstream_mod1_api http://model1-api:5000;
            proxy_pass $upstream_mod1_api;
        }

        # Model 2 Dashboard
        location /mod2/ {
            set $upstream_mod2_dash http://model2-dashboard:8502;
            proxy_pass $upstream_mod2_dash;
            
            # WebSocket Support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            proxy_connect_timeout 60s;
        }

        # Model 2 API
        location /mod2/api/ {
            rewrite ^/mod2/api/(.*)$ /$1 break;
            set $upstream_mod2_api http://model2-api:5001;
            proxy_pass $upstream_mod2_api;
        }
    }
}
